services:
  hapi-fhir:
    image: hapiproject/hapi:latest
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/fhir/metadata || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  mapper:
    build: ./mapper
    depends_on:
      hapi-fhir:
        condition: service_healthy
    environment:
      FHIR_SERVER_URL: http://hapi-fhir:8080/fhir
